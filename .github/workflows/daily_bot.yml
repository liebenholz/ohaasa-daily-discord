name: Ohaasa Daily Bot

on:
  schedule:
    # 한국 시간 기준 평일 오전 6시 1분 실행 (UTC 기준 21시 01분)
    - cron: '01 21 * * *'
  workflow_dispatch: # 수동으로 실행해볼 수 있는 버튼

permissions:
  contents: write   # 자동 커밋&푸시에 필요

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 requests
          playwright install --with-deps chromium

      - name: Run crawler & post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DEEPL_API_KEY:   ${{ secrets.DEEPL_API_KEY }}
        run: python main.py

      # ⭐ 이메일 테스트 리포트
      - name: Build email report
        if: always()
        run: python test/build_email_report.py
        continue-on-error: true

      - name: Get date for subject
        if: always()
        id: dt
        run: echo "today=$(TZ=Asia/Seoul date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Send email report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[오하아사] 일일 테스트 리포트 ${{ steps.dt.outputs.today }}"
          to: ${{ secrets.MAIL_TO }}
          from: Ohaasa Bot <${{ secrets.MAIL_USERNAME }}>
          html_body: file://test/email_report.html
        continue-on-error: true

      - name: Commit & push horoscope JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): update horoscope ($(TZ=Asia/Seoul date +'%Y-%m-%d'))"
            git push
          fi
          
      - name: Send preview to test channel
        if: success()
        env:
          TEST_DISCORD_WEBHOOK: ${{ secrets.TEST_DISCORD_WEBHOOK }}
        run: python tests/preview_webhook.py
        continue-on-error: true   # 프리뷰 실패해도 워크플로우는 성공 처리
